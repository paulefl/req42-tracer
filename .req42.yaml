# project — REQ42 Configuration
# Description: REQ42 + ARC42 Project
# Module: https://github.com/paulefl/req42-tracer

# Project definitions
projects:
  software:
    path: .
    docs: docs/

# Bausteinsicht architecture model
bausteinsicht:
  model: architecture.jsonc

# Test result parsers
test-results:
  - format: junit
    path: reports/junit.xml
  - format: go-test-json
    path: reports/test-results.json

# Validation rules (error | warning | off)
rules:
  # Architecture
  undocumented-bausteinsicht-elements: warning

  # Requirements
  missing-review: warning

  # Tests
  missing-test-spec: error

  # Traceability
  stale-traces: warning
  missing-impl: warning
  orphan-architecture: warning
  orphan-tests: warning

# ASPICE PAM 4.0 configuration
aspice:
  # Auto-derive ASPICE level from ARC42 hierarchy
  auto-derive: true

  # Processes to validate (subset of SYS.1-3, SWE.1-6)
  processes:
    - SWE.1
    - SWE.2
    - SWE.3
    - SWE.5

  # Process-specific rules
  process-rules:
    SWE.1:
      bp-5-consistency: required
      bp-6-testability: required
    SWE.2:
      bp-4-traceability: required
    SWE.3:
      bp-4-traceability: required

# Report generation
reports:
  # HTML report with graph, matrix, and ASPICE dashboard
  html:
    output: reports/traceability-report.html
    include-graph: true
    include-matrix: true
    include-aspice: true
    theme: light

  # CLI format (text, markdown, json)
  cli:
    format: text
