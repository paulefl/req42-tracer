name: CI

# Workflow-level default: least privilege
permissions:
  contents: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23", "1.24"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Run tests with coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Coverage summary
        if: runner.os != 'Windows'
        run: go tool cover -func=coverage.out

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.24'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 30

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed for gh-pages push (master only)
      pull-requests: write  # needed for PR comments (PR runs only)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run benchmarks
        run: |
          go test ./src/internal/graph/... ./src/internal/aspice/... \
            -bench=. -benchtime=3s -benchmem \
            -run='^$' \
            | tee bench.txt

      - name: Upload benchmark results (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench.txt
          retention-days: 14

      - name: Store & track benchmark results (master only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: go
          output-file-path: bench.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          comment-on-alert: true
          alert-threshold: '130%'
          fail-on-alert: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # SARIF upload requires security-events write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.6.0
          staticcheck ./...

      - name: gosec (SARIF)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
          gosec -severity medium -confidence medium -fmt sarif -out gosec.sarif ./... || true

      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
          category: gosec

  release:
    name: Release
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build binaries
        run: |
          mkdir -p dist
          VERSION="${{ github.ref_name }}"
          LDFLAGS="-s -w -trimpath -X main.version=${VERSION}"
          GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/req42-tracer-linux-amd64   ./src/cmd/req42-tracer
          GOOS=linux   GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/req42-tracer-linux-arm64   ./src/cmd/req42-tracer
          GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/req42-tracer-darwin-amd64  ./src/cmd/req42-tracer
          GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/req42-tracer-darwin-arm64  ./src/cmd/req42-tracer
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/req42-tracer-windows-amd64.exe ./src/cmd/req42-tracer

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: dist/*
          generate_release_notes: true
