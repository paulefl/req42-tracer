name: CI

# Workflow-level default: least privilege
permissions:
  contents: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23", "1.24"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Run tests with coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Coverage summary
        if: runner.os != 'Windows'
        run: go tool cover -func=coverage.out

      - name: Export test results (JUnit XML + go-test JSON)
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.24'
        run: |
          mkdir -p reports
          go install github.com/jstemmer/go-junit-report/v2@latest
          go test ./... -v 2>&1 | go-junit-report -set-exit-code > reports/junit.xml || true
          go test ./... -v -json > reports/test-results.json 2>/dev/null || true

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.24'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 30

      - name: Upload test reports
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.24'
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 30

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed for gh-pages push (master only)
      pull-requests: write  # needed for PR comments (PR runs only)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run benchmarks
        run: |
          go test ./src/internal/graph/... ./src/internal/aspice/... \
            -bench=. -benchtime=3s -benchmem \
            -run='^$' \
            | tee bench.txt

      - name: Upload benchmark results (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench.txt
          retention-days: 14

      - name: Store & track benchmark results (master only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: go
          output-file-path: bench.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          comment-on-alert: true
          alert-threshold: '150%'
          fail-on-alert: false

  deadcode:
    name: Dead Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install deadcode
        run: go install golang.org/x/tools/cmd/deadcode@latest

      - name: Check dead code
        working-directory: src
        run: |
          deadcode -test ./... 2>/dev/null \
            | sed 's|.*/src/||' \
            | sort > current-dead.txt

          # Step summary
          echo "### Dead Code Report" >> "$GITHUB_STEP_SUMMARY"
          COUNT=$(wc -l < current-dead.txt | tr -d ' ')
          echo "**$COUNT** unreachable function(s) (baseline: $(wc -l < .deadcode-baseline | tr -d ' '))" >> "$GITHUB_STEP_SUMMARY"
          if [ -s current-dead.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat current-dead.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          # Regressions: in current output but NOT in baseline → fail
          comm -23 <(sort current-dead.txt) <(sort .deadcode-baseline) > regressions.txt
          if [ -s regressions.txt ]; then
            echo "::error::New dead code introduced — not in .deadcode-baseline:"
            while IFS= read -r line; do
              echo "::error::$line"
            done < regressions.txt
            exit 1
          fi

          # Improvements: in baseline but no longer dead → remind to shrink baseline
          comm -23 <(sort .deadcode-baseline) <(sort current-dead.txt) > fixed.txt
          if [ -s fixed.txt ]; then
            echo "::notice::Dead code fixed — update src/.deadcode-baseline (remove entries below)"
            # Prefix each line to avoid GHA auto-annotating file:line:col patterns as errors
            while IFS= read -r line; do
              echo "::notice::  ✓ removed: $line"
            done < fixed.txt
            echo "::notice::Run: cd src && deadcode -test ./... 2>/dev/null | sed 's|.*/src/||' | sort > .deadcode-baseline"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # SARIF upload requires security-events write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.6.0
          staticcheck ./...

      - name: gosec (SARIF)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
          gosec -severity medium -confidence medium -fmt sarif -out gosec.sarif ./... || true

      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
          category: gosec

  dogfood:
    name: Dogfooding (req42-tracer on own docs)
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: reports/
        continue-on-error: true  # first run has no artifacts yet

      - name: Build req42-tracer
        run: go build -o ./req42-tracer ./src/cmd/req42-tracer/

      - name: Trace (req42-tracer on own docs)
        run: ./req42-tracer trace --verbose

      - name: Gaps (max-orphan-percentage check)
        run: ./req42-tracer gaps --verbose

      - name: Generate HTML report
        run: ./req42-tracer trace --output reports/dogfood-report.html

      - name: Upload dogfood report
        uses: actions/upload-artifact@v4
        with:
          name: dogfood-report
          path: reports/dogfood-report.html
          retention-days: 30

  release:
    name: Release
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # required for SBOM attestation

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GoReleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install Syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
