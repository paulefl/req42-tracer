name: Test (Legacy — see ci.yml)

# This workflow is superseded by ci.yml (Phase 5.3).
# Kept for artifact compatibility; triggers disabled.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test ./... -coverprofile=coverage.out
      - name: Generate JUnit XML
        if: always()
        run: |
          mkdir -p reports
          go install github.com/jstemmer/go-junit-report/v2@latest
          go test ./... -v 2>&1 | go-junit-report -set-exit-code -out reports/junit.xml
      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: reports/junit.xml
          retention-days: 30
