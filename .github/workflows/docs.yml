name: Docs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master]
    paths:
      - 'project/req42-tracer/docs/**'
      - 'docToolchainConfig.groovy'
      - 'dtcw'
  workflow_dispatch:

jobs:
  docs:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build docs (docToolchain via Docker)
        uses: paul-fleischmann-com/doctoolchain-action@a6c2403e4f622ef87518eadebb66a05e51eaec50  # v1
        with:
          output-path: build/docs

      - name: Add root index.html redirect
        run: |
          cat > build/docs/html5/index.html <<'EOF'
          <!DOCTYPE html>
          <html><head>
          <meta charset="UTF-8">
          <meta http-equiv="refresh" content="0; url=user-guide/">
          <title>req42-tracer Docs</title>
          </head><body>
          <p>Redirecting to <a href="user-guide/">User Guide</a>…</p>
          </body></html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/html5  # docToolchain 3.x default output subdir

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
